@if (isOpen()) {
<div class="bloc-modal-backdrop" (click)="onBackdropClick()">
  <div class="bloc-modal" [class]="'bloc-modal--' + size()" (click)="$event.stopPropagation()" role="dialog"
    aria-modal="true">
    <div class="bloc-modal__header">
      @if (title()) {
      <h2 class="bloc-modal__title">{{ title() }}</h2>
      }
      <button class="bloc-modal__close" aria-label="Close modal" (click)="onClose()">
        &#x2715;
      </button>
    </div>

    <div class="bloc-modal__body">
      <ng-content />
    </div>

    <div class="bloc-modal__footer">
      <ng-content select="[slot=footer]" />
    </div>
  </div>
</div>
}
