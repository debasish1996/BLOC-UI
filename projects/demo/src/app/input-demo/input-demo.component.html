<header class="mb-8 pb-4 border-b border-slate-200">
  <h1 class="m-0 mb-1 text-[1.75rem] font-bold text-slate-900">Input</h1>
  <p class="m-0 text-slate-400 text-[0.95rem]">Explore input field variants and states.</p>
</header>

<div class="grid grid-cols-[repeat(auto-fill,minmax(260px,1fr))] gap-5">
  <div class="bg-white border border-slate-200 rounded-lg p-5 flex flex-col gap-2">
    <h3 class="m-0 text-base font-semibold text-slate-900">Text Input</h3>
    <p class="m-0 text-[0.82rem] text-slate-400">Basic text field.</p>
    <div>
      <bloc-input label="Full name" placeholder="Enter your name" [(value)]="name" />
      @if (name()) {
      <span class="block text-xs text-slate-400 mt-1">Value: {{ name() }}</span>
      }
    </div>
  </div>

  <div class="bg-white border border-slate-200 rounded-lg p-5 flex flex-col gap-2">
    <h3 class="m-0 text-base font-semibold text-slate-900">Password Input</h3>
    <p class="m-0 text-[0.82rem] text-slate-400">Masked input for secrets.</p>
    <div>
      <bloc-input label="Password" placeholder="Enter password" type="password" [(value)]="passwordValue" />
    </div>
  </div>

  <div class="bg-white border border-slate-200 rounded-lg p-5 flex flex-col gap-2">
    <h3 class="m-0 text-base font-semibold text-slate-900">No Label</h3>
    <p class="m-0 text-[0.82rem] text-slate-400">Input without a label.</p>
    <div>
      <bloc-input placeholder="Search..." [(value)]="inputValue" />
    </div>
  </div>

  <div class="bg-white border border-slate-200 rounded-lg p-5 flex flex-col gap-2">
    <h3 class="m-0 text-base font-semibold text-slate-900">Disabled</h3>
    <p class="m-0 text-[0.82rem] text-slate-400">Non-interactive state.</p>
    <div>
      <bloc-input label="Read-only field" placeholder="Cannot edit" [disabled]="true" />
    </div>
  </div>
</div>
