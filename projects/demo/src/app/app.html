<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar__brand">Bloc UI</div>
    <nav class="sidebar__nav">
      @for (item of menuItems; track item.path) {
      <button class="sidebar__item" [routerLink]="item.path" routerLinkActive="sidebar__item--active">
        {{ item.label }}
      </button>
      }
    </nav>
  </aside>

  <!-- Main content -->
  <main class="content">
    <router-outlet />
  </main>
</div>
