<div class="flex min-h-screen bg-slate-50">
  <!-- Sidebar -->
  <aside class="w-[220px] shrink-0 bg-slate-800 text-slate-200 flex flex-col">
    <div class="px-5 pt-6 pb-4 text-[1.1rem] font-bold tracking-[0.04em] text-white border-b border-slate-700">
      Bloc UI
    </div>
    <nav class="flex flex-col py-3">
      @for (item of menuItems; track item.path) {
      <button
        class="cursor-pointer px-5 py-[0.65rem] text-[0.9rem] text-slate-400 hover:bg-[#273549] hover:text-slate-200 transition-colors duration-150 bg-transparent border-none outline-none text-left"
        [routerLink]="item.path" routerLinkActive="nav-active">
        {{ item.label }}
      </button>
      }
    </nav>
  </aside>

  <!-- Main content -->
  <main class="flex-1 py-8 px-10 overflow-y-auto">
    <router-outlet />
  </main>
</div>
