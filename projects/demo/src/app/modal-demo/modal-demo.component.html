<header class="mb-8 pb-4 border-b border-slate-200">
  <h1 class="m-0 mb-1 text-[1.75rem] font-bold text-slate-900">Modal</h1>
  <p class="m-0 text-slate-400 text-[0.95rem]">Explore modal dialog variants and states.</p>
</header>

<div class="grid grid-cols-[repeat(auto-fill,minmax(260px,1fr))] gap-5">
  <div class="bg-white border border-slate-200 rounded-lg p-5 flex flex-col gap-2">
    <h3 class="m-0 text-base font-semibold text-slate-900">Default (md)</h3>
    <p class="m-0 text-[0.82rem] text-slate-400">Standard medium-sized modal.</p>
    <div>
      <button blocButton variant="primary" (clicked)="openModal('md')">Open Modal</button>
    </div>
  </div>

  <div class="bg-white border border-slate-200 rounded-lg p-5 flex flex-col gap-2">
    <h3 class="m-0 text-base font-semibold text-slate-900">Small</h3>
    <p class="m-0 text-[0.82rem] text-slate-400">Compact modal for short messages.</p>
    <div>
      <button blocButton variant="secondary" (clicked)="openModal('sm')">Open Small Modal</button>
    </div>
  </div>

  <div class="bg-white border border-slate-200 rounded-lg p-5 flex flex-col gap-2">
    <h3 class="m-0 text-base font-semibold text-slate-900">Large</h3>
    <p class="m-0 text-[0.82rem] text-slate-400">Wide modal for detailed content.</p>
    <div>
      <button blocButton variant="outline" (clicked)="openModal('lg')">Open Large Modal</button>
    </div>
  </div>
</div>
