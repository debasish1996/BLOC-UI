name: Publish Tooltip to npm

on:
    push:
        tags:
            - 'tooltip-v*'
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write # required for npm trusted publishing

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: npm ci

            - name: Build bloc-ui-overlay
              run: npx ng build bloc-ui-overlay --configuration production

            - name: Build bloc-ui-tooltip
              run: npx ng build bloc-ui-tooltip --configuration production

            - name: Publish package
              run: npm publish --access public
              working-directory: dist/bloc-ui-tooltip
