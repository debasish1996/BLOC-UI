name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm ci

            - name: Build all libraries and demo
              run: bash ./build.sh --production

            - name: Run unit tests
              run: npm test

    e2e:
        runs-on: ubuntu-latest
        needs: build-and-test
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Build all libraries and demo
              run: bash ./build.sh --production

            - name: Run E2E tests
              run: npm run e2e

            - name: Upload Playwright report
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 14

    deploy:
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        needs: e2e
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install dependencies
              run: npm ci

            - name: Build all libraries
              run: bash ./build.sh --production

            - name: Build demo for GitHub Pages
              run: npx ng build demo --configuration production --base-href /

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist/demo/browser

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
