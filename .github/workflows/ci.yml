name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ── All three jobs run in parallel ──────────────────────────

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - name: Build all libraries and demo (production)
              run: bash ./build.sh --production

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  retention-days: 1

    unit-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - name: Run unit tests
              run: npm test

    e2e:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                shardIndex: [1, 2]
                shardTotal: [2]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-chromium-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
              run: npm run e2e -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

            - name: Upload Playwright report
              if: ${{ !cancelled() }}
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-${{ matrix.shardIndex }}
                  path: playwright-report/
                  retention-days: 14

    # ── Deploy waits for all checks to pass ─────────────────────

    deploy:
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        needs: [build, unit-test, e2e]
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/

            - name: Build demo for GitHub Pages
              run: npx ng build demo --configuration production --base-href /

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist/demo/browser

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
